name: Enforce dev-to-main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR is from dev branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::PRs to main must come from the dev branch. Source: ${{ github.head_ref }}"
            exit 1
          fi
          echo "PR is from dev branch"
