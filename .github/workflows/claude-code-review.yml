name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model claude-opus-4-6 --allowedTools mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_comment,mcp__github_comment__create_comment"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Only flag HIGH SIGNAL issues:
            - Code that will fail to compile or parse (syntax errors, missing imports)
            - Code that will definitely produce wrong results (clear logic errors)
            - Security vulnerabilities (injection, auth bypass, secrets in code)

            Do NOT flag:
            - Code style, naming, or formatting concerns
            - Subjective improvements or refactoring suggestions
            - Potential issues that depend on specific inputs or state
            - Edge cases that are unlikely in practice

            Before posting, check if you have already commented on this PR.
            If you have already left comments, only comment on NEW issues
            introduced in the latest commit. Do not re-raise issues from
            previous reviews that have already been addressed or acknowledged.

            If no issues are found, post a single comment: "No issues found."
